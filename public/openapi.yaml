                                  media_id:
                                    type: string
                                  url:
                                    type: string
                                  width:
                                    type: integer
                                  height:
                                    type: integer
                                  format:
                                    type: string
                            caption:
                              type: string
                            hashtags:
                              type: array
                              items:
                                type: string
                            alt_text:
                              type: string
                            like_count:
                              type: integer
                            comment_count:
                              type: integer
                            is_sensitive:
                              type: boolean
                            is_owner_influenced:
                              type: boolean
                            report_score:
                              type: number
                            created_at:
                              format: date-time
                              type: string
                            author:
                              type: object
                              required:
                                - name
                                - claimed
                              properties:
                                name:
                                  type: string
                                avatar_url:
                                  type: string
                                claimed:
                                  type: boolean
                      next_cursor:
                        type: string
                      has_more:
                        type: boolean
                  request_id:
                    type: string
        "400":
