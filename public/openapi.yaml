          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                  - request_id
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    required:
                      - items
                      - has_more
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          required:
                            - id
                            - images
                            - hashtags
                            - like_count
                            - comment_count
                            - is_sensitive
                            - is_owner_influenced
